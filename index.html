<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>baby-watch</title>
<style>
  :root{
    /* ライトテーマ（デフォルト・お母さんが見やすい白ベース） */
    --bg: #fbfaf7;
    --surface: #ffffff;
    --surface-2: #f2efe9;
    --border: #e3ddd2;
    --text: #3d3833;
    --text-dim: #6b6459;
    --accent: #3f8a78;       /* 落ち着いたセージグリーン。文字色としても使うため少し濃いめ */
    --accent-soft: #dcefe9;  /* 淡色背景用 */
    --accent-dim: #a9d2c7;
    --on-accent: #ffffff;    /* accent色の上に乗せる文字色 */
    --warn: #c97a2e;
    --danger: #c94f5d;
    --radius: 14px;
  }
  html[data-theme="night"]{
    /* 夜間モード（旧デフォルト。就寝中の部屋でまぶしくない暗色） */
    --bg: #0a0e14;
    --surface: #131a24;
    --surface-2: #1b2430;
    --border: #263140;
    --text: #e8ecf3;
    --text-dim: #8b96a8;
    --accent: #4fd1c5;
    --accent-soft: #16302d;
    --accent-dim: #2c6b66;
    --on-accent: #0a0e14;
    --warn: #f2994a;
    --danger: #e5566b;
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
  html,body{
    margin:0; padding:0; height:100%;
    background:var(--bg); color:var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", system-ui, sans-serif;
    overflow-x:hidden;
    transition: background-color .2s ease, color .2s ease;
  }
  #app{ min-height:100dvh; display:flex; flex-direction:column; }

  .theme-toggle{
    display:flex; align-items:center; gap:6px;
    background:var(--surface-2); border:1px solid var(--border); color:var(--text);
    border-radius:999px; padding:8px 14px; font-size:13px; font-weight:600;
    flex-shrink:0;
  }
  .theme-toggle:active{ transform:scale(0.96); }

  /* ---------- 共通パーツ ---------- */
  .topbar{
    display:flex; align-items:center; justify-content:space-between;
    padding: 14px 18px; border-bottom:1px solid var(--border);
    background:var(--surface);
  }
  .brand{ font-size:15px; letter-spacing:0.04em; color:var(--text-dim); display:flex; align-items:center; gap:8px; }
  .brand .dot{ width:8px; height:8px; border-radius:50%; background:var(--accent); }
  .status-pill{
    font-size:12px; padding:5px 12px; border-radius:999px;
    border:1px solid var(--border); color:var(--text-dim); background:var(--surface-2);
    display:flex; align-items:center; gap:6px; white-space:nowrap;
  }
  .status-pill.live{ color:var(--accent); border-color:var(--accent-dim); }
  .status-pill.err{ color:var(--danger); border-color:var(--danger); }
  .status-pill .dot{ width:7px; height:7px; border-radius:50%; background:currentColor; }
  .status-pill.live .dot{ animation: pulse 1.6s ease-in-out infinite; }
  @keyframes pulse{ 0%,100%{opacity:1;} 50%{opacity:.35;} }

  .center-col{ flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:24px; text-align:center; gap:20px; }

  button{
    font-family:inherit; font-size:16px; font-weight:600; cursor:pointer;
    border:none; border-radius:12px; padding:16px 20px; color:var(--on-accent); background:var(--accent);
    transition: transform .1s ease, opacity .15s ease;
  }
  button:active{ transform: scale(0.97); }
  button.secondary{ background:var(--surface-2); color:var(--text); border:1px solid var(--border); }
  button:disabled{ opacity:.4; cursor:not-allowed; }
  button.block{ width:100%; }

  .disclaimer{
    font-size:12px; line-height:1.6; color:var(--text-dim);
    background:var(--surface); border:1px solid var(--border); border-radius:10px;
    padding:12px 14px; max-width:480px; text-align:left;
  }

  /* ---------- 選択画面 ---------- */
  .mode-cards{ display:flex; flex-direction:column; gap:14px; width:100%; max-width:420px; }
  .mode-card{
    background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
    padding:20px; text-align:left; cursor:pointer; text-decoration:none; color:var(--text); display:block;
  }
  .mode-card:active{ background:var(--surface-2); }
  .mode-card h3{ margin:0 0 6px; font-size:17px; }
  .mode-card p{ margin:0; font-size:13px; color:var(--text-dim); line-height:1.5; }

  /* ---------- カメラ / ビューア共通レイアウト ---------- */
  .stage{ position:relative; flex:1; background:#000; display:flex; align-items:center; justify-content:center; overflow:hidden; }
  video{ width:100%; height:100%; object-fit:cover; background:#000; }
  .viewfinder{
    position:absolute; inset:16px; pointer-events:none;
    border-radius:10px;
  }
  .vf-corner{ position:absolute; width:26px; height:26px; border-color:var(--accent); opacity:.7; }
  .vf-tl{ top:0; left:0; border-top:2px solid; border-left:2px solid; border-top-left-radius:6px;}
  .vf-tr{ top:0; right:0; border-top:2px solid; border-right:2px solid; border-top-right-radius:6px;}
  .vf-bl{ bottom:0; left:0; border-bottom:2px solid; border-left:2px solid; border-bottom-left-radius:6px;}
  .vf-br{ bottom:0; right:0; border-bottom:2px solid; border-right:2px solid; border-bottom-right-radius:6px;}

  .controls-bar{
    display:flex; align-items:center; justify-content:center; gap:12px;
    padding: 16px; background:var(--surface); border-top:1px solid var(--border);
    padding-bottom: max(16px, env(safe-area-inset-bottom));
  }
  .icon-btn{
    width:56px; height:56px; border-radius:50%; background:var(--surface-2);
    border:1px solid var(--border); color:var(--text); font-size:22px;
    display:flex; align-items:center; justify-content:center; padding:0;
  }
  .icon-btn.active{ background:var(--accent); color:var(--on-accent); border-color:var(--accent); }
  .icon-btn.talk{ width:72px; height:72px; font-size:26px; background:var(--warn); color:#1a1206; border-color:var(--warn); }
  .icon-btn.talk.pressed{ background:#ffb46b; transform:scale(1.05); }

  .room-code{
    font-size:44px; font-weight:700; letter-spacing:0.12em; font-variant-numeric: tabular-nums;
    background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
    padding:22px 30px; color:var(--accent);
  }
  .room-code-label{ font-size:13px; color:var(--text-dim); margin-bottom:4px; }

  input[type=text]{
    font-family:inherit; font-size:22px; letter-spacing:0.1em; text-align:center;
    padding:16px; border-radius:12px; border:1px solid var(--border); background:var(--surface);
    color:var(--text); width:100%; max-width:280px;
  }
  input[type=text]:focus{ outline:2px solid var(--accent); }

  .hint{ font-size:12px; color:var(--text-dim); }
  .hidden{ display:none !important; }

  .toast{
    position:fixed; bottom: 100px; left:50%; transform:translateX(-50%);
    background:var(--surface-2); border:1px solid var(--border); color:var(--text);
    padding:10px 16px; border-radius:999px; font-size:13px; z-index:50;
    box-shadow: 0 4px 20px rgba(0,0,0,.4);
  }
</style>
</head>
<body>
<div id="app"></div>

<script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script>
/* =========================================================
   0. 共通ユーティリティ
   ========================================================= */
const $app = document.getElementById('app');
const params = new URLSearchParams(location.search);
const mode = params.get('mode'); // 'camera' | 'viewer' | null

function makeRoomCode(len = 6){
  // 紛らわしい文字(0/O, 1/I)を除いた大文字英数字
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let out = '';
  for (let i = 0; i < len; i++) out += chars[Math.floor(Math.random() * chars.length)];
  return out;
}

function showToast(msg, ms = 2200){
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), ms);
}

function el(html){
  const div = document.createElement('div');
  div.innerHTML = html.trim();
  return div.firstElementChild;
}

/* ---- テーマ切替（白ベース／夜間モード） ---- */
let currentTheme = 'light'; // 'light' | 'night'（ページ内のみ有効。読み込みごとに白ベースへ戻る）

function applyThemeToDom(){
  if (currentTheme === 'night') document.documentElement.setAttribute('data-theme', 'night');
  else document.documentElement.removeAttribute('data-theme');
}

function themeToggleHtml(){
  return `<button id="themeToggle" class="theme-toggle" type="button"></button>`;
}

function updateThemeToggleLabel(){
  const btn = document.getElementById('themeToggle');
  if (!btn) return;
  btn.innerHTML = currentTheme === 'night' ? '☀️ 昼モード' : '🌙 夜間モード';
}

function bindThemeToggle(){
  applyThemeToDom();
  updateThemeToggleLabel();
  const btn = document.getElementById('themeToggle');
  if (!btn) return;
  btn.addEventListener('click', () => {
    currentTheme = currentTheme === 'night' ? 'light' : 'night';
    applyThemeToDom();
    updateThemeToggleLabel();
  });
}

/* =========================================================
   1. モード未指定 → 選択画面
   ========================================================= */
function renderSelector(){
  $app.innerHTML = `
    <div class="topbar">
      <div class="brand"><span class="dot"></span> baby-watch</div>
      ${themeToggleHtml()}
    </div>
    <div class="center-col">
      <div class="mode-cards">
        <a class="mode-card" href="?mode=camera">
          <h3>📷 カメラモード</h3>
          <p>ベッドサイドに設置するスマホで開きます。映像・音声を送信します。</p>
        </a>
        <a class="mode-card" href="?mode=viewer">
          <h3>📱 ビューアモード</h3>
          <p>見守る側のスマホで開きます。ルームIDを入力して視聴します。</p>
        </a>
      </div>
      <div class="disclaimer">
        本アプリは医療機器ではありません。SIDS（乳幼児突然死症候群）等を防止・検知する
        ことを保証するものではなく、別室・家事中の気づきを早めるための補助ツールとして
        ご利用ください。
      </div>
    </div>
  `;
  bindThemeToggle();
}

/* =========================================================
   2. カメラモード
   ========================================================= */
async function renderCamera(){
  $app.innerHTML = `
    <div class="topbar">
      <div class="brand"><span class="dot"></span> カメラモード</div>
      <div style="display:flex; align-items:center; gap:8px;">
        ${themeToggleHtml()}
        <div id="status" class="status-pill"><span class="dot"></span>準備中…</div>
      </div>
    </div>
    <div class="stage">
      <video id="localVideo" autoplay playsinline muted></video>
      <div class="viewfinder">
        <div class="vf-corner vf-tl"></div><div class="vf-corner vf-tr"></div>
        <div class="vf-corner vf-bl"></div><div class="vf-corner vf-br"></div>
      </div>
    </div>
    <div class="center-col" style="flex:none; padding:20px;">
      <div class="room-code-label">ビューア側でこのIDを入力してください</div>
      <div id="roomCode" class="room-code">------</div>
      <div class="hint" id="wakeHint">画面スリープ防止: 確認中…</div>
    </div>
    <audio id="remoteTalkAudio" autoplay playsinline></audio>
  `;
  bindThemeToggle();

  const statusEl = document.getElementById('status');
  const roomCodeEl = document.getElementById('roomCode');
  const wakeHintEl = document.getElementById('wakeHint');
  const localVideoEl = document.getElementById('localVideo');
  const remoteTalkAudioEl = document.getElementById('remoteTalkAudio');

  function setStatus(text, cls){
    statusEl.className = 'status-pill' + (cls ? ' ' + cls : '');
    statusEl.innerHTML = `<span class="dot"></span>${text}`;
  }

  // --- Wake Lock（画面スリープ防止） ---
  let wakeLock = null;
  async function requestWakeLock(){
    try{
      if ('wakeLock' in navigator){
        wakeLock = await navigator.wakeLock.request('screen');
        wakeHintEl.textContent = '画面スリープ防止: 有効';
        wakeLock.addEventListener('release', () => {
          wakeHintEl.textContent = '画面スリープ防止: 解除されました（タップで再取得）';
        });
      } else {
        wakeHintEl.textContent = '画面スリープ防止: 非対応のブラウザです（手動でスリープ設定をオフにしてください）';
      }
    } catch(e){
      wakeHintEl.textContent = '画面スリープ防止: 取得失敗（' + e.message + '）';
    }
  }
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') requestWakeLock();
  });
  document.body.addEventListener('click', () => { if(!wakeLock) requestWakeLock(); }, { once:true });
  requestWakeLock();

  // --- カメラ・マイク取得（背面カメラ優先） ---
  let localStream;
  try {
    localStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' } },
      audio: true
    });
  } catch(e){
    setStatus('カメラ/マイク取得失敗', 'err');
    showToast('カメラ・マイクへのアクセスを許可してください: ' + e.message, 5000);
    return;
  }
  localVideoEl.srcObject = localStream;

  // --- PeerJS 初期化（ルームIDをカメラ側が発行） ---
  const roomId = makeRoomCode();
  roomCodeEl.textContent = roomId;
  setStatus('待機中（接続待ち）', null);

  const peer = new Peer('bw-' + roomId, {
    // PeerJS公式クラウドのデフォルトシグナリングサーバを使用
    debug: 1
  });

  peer.on('open', () => {
    setStatus('待機中（接続待ち）', null);
  });

  peer.on('error', (err) => {
    console.error('Peer error', err);
    setStatus('通信エラー', 'err');
    showToast('接続エラー: ' + err.type, 4000);
  });

  // ビューアからのハンドシェイク（データ接続）を受けて、
  // カメラ側から映像付きでcall()を発信する（映像を持つ側が発信するのがWebRTC的に確実なため）
  peer.on('connection', (conn) => {
    const viewerId = conn.peer;
    conn.on('open', () => {
      const call = peer.call(viewerId, localStream);
      setStatus('接続中（映像送信中）', 'live');
      call.on('close', () => setStatus('待機中（接続待ち）', null));
      call.on('error', () => setStatus('通信エラー', 'err'));
    });
    conn.on('close', () => setStatus('待機中（接続待ち）', null));
  });

  // ビューアからのプッシュトゥトーク音声着信（受信専用で応答）
  peer.on('call', (call) => {
    if (call.metadata && call.metadata.kind === 'talk') {
      call.answer(); // カメラ側からは何も送らず受信のみ
      call.on('stream', (remoteStream) => {
        remoteTalkAudioEl.srcObject = remoteStream;
        showToast('🔊 ビューアから通話中');
      });
      call.on('close', () => showToast('通話終了'));
    }
  });
}

/* =========================================================
   3. ビューアモード
   ========================================================= */
async function renderViewer(){
  $app.innerHTML = `
    <div class="topbar">
      <div class="brand"><span class="dot"></span> ビューアモード</div>
      <div style="display:flex; align-items:center; gap:8px;">
        ${themeToggleHtml()}
        <div id="status" class="status-pill"><span class="dot"></span>未接続</div>
      </div>
    </div>

    <div id="entryScreen" class="center-col">
      <div class="room-code-label">カメラ側に表示されているIDを入力</div>
      <input id="roomInput" type="text" maxlength="6" placeholder="ABC123" autocapitalize="characters" autocomplete="off">
      <button id="connectBtn" class="block" style="max-width:280px;">視聴開始</button>
      <div class="hint">※iOS Safariの制限により、映像・音声はこのボタン操作後に再生されます</div>
    </div>

    <div id="watchScreen" class="hidden" style="display:flex; flex-direction:column; flex:1;">
      <div class="stage">
        <video id="remoteVideo" autoplay playsinline></video>
        <div class="viewfinder">
          <div class="vf-corner vf-tl"></div><div class="vf-corner vf-tr"></div>
          <div class="vf-corner vf-bl"></div><div class="vf-corner vf-br"></div>
        </div>
      </div>
      <div class="controls-bar">
        <button id="muteBtn" class="icon-btn" title="ミュート切替">🔊</button>
        <button id="talkBtn" class="icon-btn talk" title="押している間だけ話せます">🎙️</button>
      </div>
    </div>
  `;
  bindThemeToggle();

  const statusEl = document.getElementById('status');
  const entryScreen = document.getElementById('entryScreen');
  const watchScreen = document.getElementById('watchScreen');
  const roomInput = document.getElementById('roomInput');
  const connectBtn = document.getElementById('connectBtn');
  const remoteVideoEl = document.getElementById('remoteVideo');
  const muteBtn = document.getElementById('muteBtn');
  const talkBtn = document.getElementById('talkBtn');

  function setStatus(text, cls){
    statusEl.className = 'status-pill' + (cls ? ' ' + cls : '');
    statusEl.innerHTML = `<span class="dot"></span>${text}`;
  }

  roomInput.addEventListener('input', () => {
    roomInput.value = roomInput.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
  });

  let peer = null;
  let talkStream = null; // プッシュトゥトーク用マイクストリーム（都度取得）
  let activeTalkCall = null;

  connectBtn.addEventListener('click', async () => {
    const code = roomInput.value.trim();
    if (code.length < 4){
      showToast('IDを入力してください');
      return;
    }
    connectBtn.disabled = true;
    connectBtn.textContent = '接続中…';
    setStatus('接続中…', null);

    peer = new Peer(undefined, { debug: 1 });
    const targetId = 'bw-' + code;

    peer.on('error', (err) => {
      console.error('Peer error', err);
      setStatus('通信エラー', 'err');
      showToast('接続エラー: ' + err.type, 4000);
      connectBtn.disabled = false;
      connectBtn.textContent = '視聴開始';
    });

    // カメラ側からの映像callを受信専用で応答する
    peer.on('call', (call) => {
      if (call.metadata && call.metadata.kind === 'talk') return; // 自分から発信したtalk callは無視
      call.answer(); // ストリームを渡さない＝受信専用
      call.on('stream', (remoteStream) => {
        remoteVideoEl.srcObject = remoteStream;
        entryScreen.classList.add('hidden');
        watchScreen.classList.remove('hidden');
        setStatus('接続中（映像受信中）', 'live');
      });
      call.on('close', () => {
        setStatus('切断されました', 'err');
        showToast('カメラ側との接続が切れました');
      });
      call.on('error', (e) => {
        console.error(e);
        setStatus('通信エラー', 'err');
      });
    });

    peer.on('open', () => {
      // カメラ側にハンドシェイク（データ接続）を送り、映像callの発信を促す
      const conn = peer.connect(targetId);
      conn.on('error', (e) => {
        console.error(e);
        setStatus('通信エラー', 'err');
      });

      // 30秒応答が無ければタイムアウト扱い
      setTimeout(() => {
        if (watchScreen.classList.contains('hidden')){
          setStatus('接続できませんでした', 'err');
          showToast('カメラ側が起動しているか、IDが正しいか確認してください', 4000);
          connectBtn.disabled = false;
          connectBtn.textContent = '視聴開始';
        }
      }, 30000);
    });
  });

  // --- ミュート切替 ---
  let muted = false;
  muteBtn.addEventListener('click', () => {
    muted = !muted;
    remoteVideoEl.muted = muted;
    muteBtn.textContent = muted ? '🔇' : '🔊';
    muteBtn.classList.toggle('active', !muted);
  });

  // --- プッシュトゥトーク（押している間だけカメラ側スピーカーに音声送信） ---
  async function startTalk(){
    if (!peer || !peer.open) return;
    talkBtn.classList.add('pressed');
    try{
      if (!talkStream){
        talkStream = await navigator.mediaDevices.getUserMedia({ audio: true });
      }
      const code = roomInput.value.trim();
      const targetId = 'bw-' + code;
      activeTalkCall = peer.call(targetId, talkStream, { metadata: { kind: 'talk' } });
      showToast('🎙️ 送話中…');
    } catch(e){
      showToast('マイクを利用できません: ' + e.message, 3000);
      talkBtn.classList.remove('pressed');
    }
  }
  function stopTalk(){
    talkBtn.classList.remove('pressed');
    if (activeTalkCall){
      activeTalkCall.close();
      activeTalkCall = null;
    }
  }
  ['mousedown','touchstart'].forEach(ev => talkBtn.addEventListener(ev, (e) => { e.preventDefault(); startTalk(); }));
  ['mouseup','mouseleave','touchend','touchcancel'].forEach(ev => talkBtn.addEventListener(ev, (e) => { e.preventDefault(); stopTalk(); }));
}

/* =========================================================
   4. ルーティング
   ========================================================= */
if (mode === 'camera') renderCamera();
else if (mode === 'viewer') renderViewer();
else renderSelector();
</script>
</body>
</html>
